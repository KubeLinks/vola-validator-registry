name: Validate JSON

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-json:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Validate JSON files
        run: |
          find . -name "*.json" -print0 | while IFS= read -r -d '' file; do
            echo "Checking $file"
            jq empty "$file"
          done